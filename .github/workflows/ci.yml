# CI — exercises every binding on every supported OS.
#
# A single matrix job calls the same release.py dispatcher we use locally:
#
#     python release.py test -t <target>
#
# `fail-fast: false` so one binding breaking doesn't hide the others.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Static checks — fast, fail-fast ────────────────────────────────────────
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: cargo fmt --check
        working-directory: .
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: .
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Per-binding test matrix ───────────────────────────────────────────────
  test:
    name: ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        target: [rust, python, node, wasm, java, dotnet, go, ruby]

    steps:
      - uses: actions/checkout@v4

      # Toolchains — only the relevant one for each row.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        if: matrix.target == 'node' || matrix.target == 'wasm'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        if: matrix.target == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup .NET
        if: matrix.target == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Setup Go
        if: matrix.target == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Ruby
        if: matrix.target == 'ruby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install Ruby ffi gem
        if: matrix.target == 'ruby'
        run: gem install ffi --no-document

      - name: Install wasm-pack
        if: matrix.target == 'wasm'
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.1'   # workspace-inheritance support; predictable on every runner

      - name: Run dispatcher
        working-directory: .
        shell: bash
        run: python release.py test -t ${{ matrix.target }}

  # ── Cross-binding correctness test ────────────────────────────────────────
  # One canonical .tomlp fixture parsed by every binding, JSON-compared.
  # If any binding's output drifts from the Rust core's, this fails.
  cross-binding:
    name: cross-binding (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false
      - name: Install Ruby ffi gem
        run: gem install ffi --no-document
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.1'
      - name: Cross-binding integration test
        working-directory: .
        shell: bash
        run: python release.py test -t cross-binding

  # ── Java + .NET cross-platform double-check ───────────────────────────────
  # The Java JNA and .NET P/Invoke bindings load the FFI dll via the OS
  # loader, so this is the most-likely place a per-platform bug shows up.
  ffi-load-test:
    name: FFI loader (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - name: Java + .NET
        working-directory: .
        shell: bash
        run: |
          python release.py test -t java
          python release.py test -t dotnet
